<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulador de Juros Compostos</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f3;
      color: #1a1a18;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      border: 0.5px solid rgba(0,0,0,0.12);
      padding: 2rem;
      width: 100%;
      max-width: 760px;
    }

    h1 {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 0.25rem;
      color: #1a1a18;
    }

    .subtitle {
      font-size: 14px;
      color: #6b6b67;
      margin-bottom: 1.75rem;
    }

    /* Sliders */
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      margin-bottom: 1.75rem;
    }

    @media (max-width: 520px) {
      .controls { grid-template-columns: 1fr; }
    }

    .control-group label {
      display: block;
      font-size: 13px;
      color: #6b6b67;
      margin-bottom: 6px;
    }

    .control-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input[type="range"] {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: #e0dfd8;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #185FA5;
      border: 2px solid #fff;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.15);
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #185FA5;
      border: 2px solid #fff;
      cursor: pointer;
    }

    .control-value {
      font-size: 14px;
      font-weight: 500;
      min-width: 72px;
      text-align: right;
      color: #1a1a18;
    }

    /* Metric cards */
    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 1.75rem;
    }

    @media (max-width: 480px) {
      .metrics { grid-template-columns: 1fr; }
    }

    .metric {
      background: #f5f5f3;
      border-radius: 10px;
      padding: 1rem;
    }

    .metric-label {
      font-size: 12px;
      color: #6b6b67;
      margin-bottom: 4px;
    }

    .metric-value {
      font-size: 20px;
      font-weight: 500;
      color: #1a1a18;
    }

    .metric-value.positive { color: #3B6D11; }

    /* Chart */
    .chart-wrapper {
      position: relative;
      width: 100%;
      height: 280px;
    }

    /* Legend */
    .legend {
      display: flex;
      gap: 20px;
      margin-top: 12px;
      font-size: 12px;
      color: #6b6b67;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Simulador de Juros Compostos</h1>
    <p class="subtitle">Veja como o seu dinheiro cresce ao longo do tempo</p>

    <div class="controls">
      <div class="control-group">
        <label>Capital inicial (R$)</label>
        <div class="control-row">
          <input type="range" id="principal" min="1000" max="50000" step="1000" value="10000">
          <span class="control-value" id="principal-out">R$ 10.000</span>
        </div>
      </div>

      <div class="control-group">
        <label>Taxa de juros (% ao ano)</label>
        <div class="control-row">
          <input type="range" id="rate" min="1" max="30" step="0.5" value="10">
          <span class="control-value" id="rate-out">10,0%</span>
        </div>
      </div>

      <div class="control-group">
        <label>Período (anos)</label>
        <div class="control-row">
          <input type="range" id="years" min="1" max="40" step="1" value="20">
          <span class="control-value" id="years-out">20 anos</span>
        </div>
      </div>

      <div class="control-group">
        <label>Aporte mensal (R$)</label>
        <div class="control-row">
          <input type="range" id="monthly" min="0" max="2000" step="100" value="0">
          <span class="control-value" id="monthly-out">R$ 0</span>
        </div>
      </div>
    </div>

    <div class="metrics">
      <div class="metric">
        <div class="metric-label">Valor final</div>
        <div class="metric-value" id="final-value">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Total investido</div>
        <div class="metric-value" id="total-invested">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Juros ganhos</div>
        <div class="metric-value positive" id="interest-earned">—</div>
      </div>
    </div>

    <div class="chart-wrapper">
      <canvas id="compChart"></canvas>
    </div>

    <div class="legend">
      <div class="legend-item">
        <div class="legend-dot" style="background:#185FA5;"></div>
        <span>Juros compostos</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#888780;"></div>
        <span>Juros simples</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#3B6D11; opacity:0.5;"></div>
        <span>Total investido</span>
      </div>
    </div>
  </div>

  <script>
    const fmt = v => 'R$ ' + Math.round(v).toLocaleString('pt-BR');

    let chart;

    function calc() {
      const P = +document.getElementById('principal').value;
      const r = +document.getElementById('rate').value / 100;
      const Y = +document.getElementById('years').value;
      const M = +document.getElementById('monthly').value;

      document.getElementById('principal-out').textContent = fmt(P);
      document.getElementById('rate-out').textContent = (+document.getElementById('rate').value).toFixed(1).replace('.', ',') + '%';
      document.getElementById('years-out').textContent = Y + ' anos';
      document.getElementById('monthly-out').textContent = fmt(M);

      const labels = [], compData = [], simpData = [], investedData = [];
      const rm = r / 12;

      for (let y = 0; y <= Y; y++) {
        labels.push(y === 0 ? 'Hoje' : y + 'a');
        const months = y * 12;

        let comp;
        if (rm === 0) {
          comp = P + M * months;
        } else {
          comp = P * Math.pow(1 + rm, months) + M * (Math.pow(1 + rm, months) - 1) / rm;
        }

        const simp = P * (1 + r * y) + M * months;
        const invested = P + M * months;

        compData.push(Math.round(comp));
        simpData.push(Math.round(simp));
        investedData.push(Math.round(invested));
      }

      const finalComp = compData[compData.length - 1];
      const finalInvested = investedData[investedData.length - 1];

      document.getElementById('final-value').textContent = fmt(finalComp);
      document.getElementById('total-invested').textContent = fmt(finalInvested);
      document.getElementById('interest-earned').textContent = fmt(finalComp - finalInvested);

      if (chart) {
        chart.data.labels = labels;
        chart.data.datasets[0].data = compData;
        chart.data.datasets[1].data = simpData;
        chart.data.datasets[2].data = investedData;
        chart.update();
      } else {
        chart = new Chart(document.getElementById('compChart'), {
          type: 'line',
          data: {
            labels,
            datasets: [
              {
                label: 'Juros compostos',
                data: compData,
                borderColor: '#185FA5',
                backgroundColor: 'rgba(24,95,165,0.08)',
                tension: 0.3,
                fill: true,
                pointRadius: 2
              },
              {
                label: 'Juros simples',
                data: simpData,
                borderColor: '#888780',
                backgroundColor: 'transparent',
                tension: 0.3,
                borderDash: [5, 4],
                pointRadius: 0
              },
              {
                label: 'Total investido',
                data: investedData,
                borderColor: '#3B6D11',
                backgroundColor: 'rgba(59,109,17,0.08)',
                tension: 0,
                fill: true,
                pointRadius: 0,
                borderDash: [3, 3]
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              y: {
                ticks: {
                  callback: v => v >= 1000 ? 'R$ ' + (v / 1000).toFixed(0) + 'k' : 'R$ ' + v,
                  font: { size: 11 }
                },
                grid: { color: 'rgba(128,128,128,0.1)' }
              },
              x: {
                ticks: { autoSkip: true, maxTicksLimit: 10, font: { size: 11 } },
                grid: { display: false }
              }
            }
          }
        });
      }
    }

    ['principal', 'rate', 'years', 'monthly'].forEach(id => {
      document.getElementById(id).addEventListener('input', calc);
    });

    calc();
  </script>
</body>
</html>
